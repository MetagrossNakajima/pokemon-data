name: Upload sv item icons to Cloudflare R2

on:
  push:
    branches:
      - main
    paths:
      - "sv/icons/item/**"
  workflow_dispatch:

jobs:
  upload-to-r2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Cloudflare R2に v1 フォルダ内のファイルを一括でアップロード
      - name: Upload sv/icons/item
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_SECRET_KEY }}
          AWS_EC2_METADATA_DISABLED: true
        run: |
          aws s3 sync ./sv/icons/item s3://${{ vars.CLOUDFLARE_BUCKET }}/sv/icons/item \
            --endpoint-url=https://${{ vars.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --exact-timestamps \
            --no-guess-mime-type \
            --cli-read-timeout 300 \
            --cli-connect-timeout 60 \
            --no-follow-symlinks \
            --size-only \
            --only-show-errors \
            --quiet \
            --metadata-directive REPLACE \
            --delete \
            --exclude "*" --include "*.png" \
            --profile default \
            --storage-class STANDARD \
            --content-type "image/png" \
            --follow-symlinks \
            --region auto \
            --no-progress \
            --concurrency 5